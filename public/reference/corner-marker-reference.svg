<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Corner marker reference">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="60" y="90" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#001a5e">Corner Marker Reference</text>
  <text x="60" y="138" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475467">
    Use high-contrast square markers near each sheet corner for stable template matching and centroid detection.
  </text>

  <g transform="translate(110,190)">
    <rect x="0" y="0" width="110" height="110" fill="#f8f9fc" stroke="#d0d5dd"/>
    <rect x="33" y="33" width="44" height="44" fill="#000000"/>
    <text x="0" y="142" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0030ad">TL / TR / BL / BR</text>
  </g>

  <g transform="translate(360,190)">
    <rect x="0" y="0" width="110" height="110" fill="#f8f9fc" stroke="#d0d5dd"/>
    <rect x="27" y="27" width="56" height="56" fill="#000000"/>
    <text x="-6" y="142" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0030ad">Preferred: bold square</text>
  </g>

  <g transform="translate(610,190)">
    <rect x="0" y="0" width="110" height="110" fill="#f8f9fc" stroke="#d0d5dd"/>
    <rect x="40" y="40" width="30" height="30" fill="#000000"/>
    <text x="-14" y="142" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ff6400">Avoid: very tiny marker</text>
  </g>
</svg>
